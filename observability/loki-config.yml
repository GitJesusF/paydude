auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  # 7 days, matching Prometheus (--storage.tsdb.retention.time=7d in the compose overlay). The
  # value alone enforces nothing — deletion happens in the compactor below.
  retention_period: 168h

# Retention is ENFORCED here: in Loki 3.x only a compactor with retention_enabled actually
# deletes chunks; limits_config.retention_period is just the window it honours. Without this
# block the loki-data volume grows without bound. delete_request_store is mandatory once
# retention_enabled is true (it backs the delete-request log).
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

ruler:
  alertmanager_url: ""

analytics:
  reporting_enabled: false