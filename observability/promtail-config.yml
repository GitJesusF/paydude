server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  # Volume-backed (promtail-positions in docker-compose.observability.yml) so a recreated
  # container resumes where it left off instead of re-shipping every log from the beginning —
  # Loki does not deduplicate, so lost positions mean duplicate lines.
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Auto-discovers every running container via the Docker socket and ships stdout/stderr to Loki.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Use the container name (minus the leading slash) as the `container` label.
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      # Expose the Compose service name as `service` for easier filtering in Loki.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service

    # Targets discovered via docker_sd are read through the Docker API (the socket mounted in
    # docker-compose.observability.yml), which already demultiplexes stdout/stderr and strips the
    # json-file envelope — lines arrive below as the raw container payload, so no `docker` stage
    # is needed (that stage exists for tailing /var/lib/docker/containers/*.log from disk).
    pipeline_stages:
      # For the paydude-app container in prod profile, the payload is JSON (LogstashEncoder).
      # Parse it so `level` becomes a Loki label and the W3C trace ids (`traceId`, `spanId`)
      # plus `logger` ride along as structured metadata.
      - match:
          selector: '{container="paydude-app"}'
          stages:
            - json:
                expressions:
                  level: level
                  traceId: traceId
                  spanId: spanId
                  logger: logger
            - labels:
                level:
            - structured_metadata:
                traceId:
                spanId:
                logger: