# Test profile — activated explicitly via @ActiveProfiles("test") on integration tests.
# Unit tests (Mockito + JUnit only) do not boot Spring and therefore ignore this file.
#
# Datasource: NOT configured here. Testcontainers @ServiceConnection (defined in
# com.jesusf.paydude.support.TestcontainersConfiguration) provides URL, username and password
# pointing to the ephemeral Postgres container at runtime.

# JWT — stable Base64 key (32 bytes, the HS256 minimum). The real secret is a CI/prod env
# variable; this dummy is fine because tokens minted in tests never leave the JVM under test.
application.security.jwt.secret-key=MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
application.security.jwt.expiration=86400000

# Refresh-token TTL kept long in tests so no wall-clock waiting is needed to exercise rotation
# (tests that need expiration construct entities with a past expiresAt directly).
application.security.refresh-token.expiration=PT168H

# Credentials rotation policy enabled to exercise the full UserDetails contract end-to-end.
application.security.credentials-expiration-days=90

# Breach screening disabled: integration tests register users against the full Spring context,
# and the live HaveIBeenPwned checker would make a real network call per registration — flaky,
# slow, and a hidden dependency on the public internet. SecurityConfig wires a no-op checker
# when this is false. Unit tests mock BreachedPasswordGuard outright and ignore this entirely.
application.security.password.breach-check-enabled=false

# Account lockout inherits the cross-profile defaults from application.properties (enabled, 5
# attempts, 15m window). AccountLockoutIT reads max-attempts from SecurityProperties instead of
# hard-coding it, and drives AuthService.login directly — bypassing AuthController's per-email
# AuthRateLimiter (capacity 5), which over HTTP would mask the 423 lockout behind a 429.

# Actuator Basic-auth scraper credential. @NotBlank on SecurityProperties.Actuator.password means
# the context fails to boot without it, so a throwaway value is set here. No IT scrapes the admin
# tier over HTTP (metric assertions use SimpleMeterRegistry directly), so the value is never
# actually exercised — it exists purely to satisfy the binding. Username defaults to `prometheus`
# from application.properties.
application.security.actuator.password=test-actuator-secret

# Rate-limit thresholds. Values mirror the dev profile so the same buckets are exercised end-to-end
# in integration tests. AuthorizationIT does not invoke /login (only /register, which the limiter
# does not throttle), so these values are not on the hot path of tests today — they exist so that
# a future test that does invoke /login knows the live thresholds.
application.security.rate-limit.login-by-ip.capacity=20
application.security.rate-limit.login-by-ip.period=1m
application.security.rate-limit.login-by-email.capacity=5
application.security.rate-limit.login-by-email.period=15m
application.security.rate-limit.register-by-ip.capacity=5
application.security.rate-limit.register-by-ip.period=1h
application.security.rate-limit.refresh-by-ip.capacity=60
application.security.rate-limit.refresh-by-ip.period=1h
# Per-user write throttle. Capacity is set generously (well above any IT's per-user write count):
# AuthorizationIT issues only a few writes per user against the real bean, and
# VirtualThreadTransferConcurrencyIT — the only heavy writer (30 transfers/user) — @MockitoBean's
# WriteRateLimiter so the throttle never falsifies its locking benchmark, exactly as it does for
# AuthRateLimiter. A test that wants to exercise the 429 builds a small-capacity WriteRateLimiter
# directly (see WriteRateLimiterTest).
application.security.rate-limit.write-by-user.capacity=200
application.security.rate-limit.write-by-user.period=1m
# MFA verify per-IP bucket. Generous in tests: MfaLoginIT drives several verify attempts (happy
# path, replay, recovery code, negative cases) from the same loopback IP in one run, and the
# point of the IT is the TOTP/lockout semantics, not the volumetric throttle (covered by unit
# tests against AuthRateLimiter directly).
application.security.rate-limit.mfa-by-ip.capacity=100
application.security.rate-limit.mfa-by-ip.period=1m
# Per-user re-auth throttle (change-password, MFA setup/disable). Generous in tests: MfaLoginIT and
# AuthorizationIT drive a handful of these per user against the real bean and care about the security
# semantics, not the volumetric throttle (covered by ReauthRateLimiterTest against the bean directly).
application.security.rate-limit.reauth-by-user.capacity=200
application.security.rate-limit.reauth-by-user.period=15m

# Idempotency key TTL. Same value as dev so tests exercise realistic retention; concurrency ITs
# and AuthorizationIT generate fresh UUID keys per test so the TTL is not actually relied upon.
application.idempotency.key-ttl=24d

# Scheduled cleanup disabled in tests. SchedulingConfig loads under @SpringBootTest, so without this
# the daily job would be scheduled — harmless, but "-" (Scheduled.CRON_DISABLED) keeps the test
# context free of a background trigger and makes the intent explicit. Tests that exercise the
# cleanup logic call ExpiredDataCleanupJob.purgeExpiredRows() directly or the service methods.
application.cleanup.cron=-

# JPA — quieter output and DDL validation against the Flyway-applied schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN

# docker-compose lifecycle disabled: tests rely on Testcontainers, not on the
# docker-compose.db-only.yml that the dev profile would otherwise try to start.
spring.docker.compose.enabled=false

# SpringDoc disabled: the OpenAPI scan and Swagger UI add startup time without value in tests.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator: health + info for the smoke ITs, plus metrics so HttpStandardsIT can pin the admin-tier
# HTTP Basic contract (anonymous health vs Basic-guarded metrics). `metrics` is used rather than
# `prometheus` on purpose: the test context falls back to SimpleMeterRegistry and never wires the
# Prometheus scrape endpoint, so /actuator/prometheus is not path-mapped here — but `metrics`
# registers from SimpleMeterRegistry and is gated by the exact same actuatorSecurityFilterChain, so
# it is a faithful stand-in for the admin tier. Metric-emission assertions still use
# SimpleMeterRegistry directly; metrics is exposed only to exercise the chain's authentication.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always