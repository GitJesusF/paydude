spring.application.name=paydude
spring.jpa.open-in-view=false

# ---- Server ----
# Single source of truth for the HTTP listen port across every profile (dev/prod/test) and the
# Docker image — 8090 rather than Spring's default 8080 to dodge the most contested local port
# (Tomcat, other Spring apps and dev proxies all default to 8080). Override per environment with
# the SERVER_PORT env var (Spring relaxed binding); the docker-compose port mapping mirrors it.
server.port=8090

# No active profile is set in the packaged application. Local development must opt into the dev
# profile explicitly (e.g. scripts/dev.sh or -Dspring-boot.run.profiles=dev), while deployments
# must choose prod/test through their environment. This prevents a direct jar run from silently
# booting with dev-only defaults.

# Tomcat serves each request on a virtual thread (Project Loom, Java 21).
# This is a pure I/O workload (Postgres + JWT parsing), the canonical case where
# virtual threads pay off: a few thousand concurrent requests no longer require
# tuning a fixed-size platform-thread pool, and blocking JDBC calls don't pin
# expensive OS threads while waiting on the network.
spring.threads.virtual.enabled=true

# ---- Actuator: cross-profile defaults ----
# Endpoint exposure and verbosity differ per profile (see application-{dev,prod,test}.properties).
# Settings here apply to every profile.
#
# Kubernetes-style liveness/readiness probes. Boot wires them automatically when
# `probes.enabled=true`: /actuator/health/liveness and /actuator/health/readiness.
# Readiness flips to OUT_OF_SERVICE during graceful shutdown so the platform stops sending
# traffic before the JVM exits.
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Graceful shutdown: in-flight requests complete (up to the timeout) before the JVM exits.
# Combined with readiness flipping OUT_OF_SERVICE on SIGTERM, this is the rolling-deploy
# story expected from a service that handles money.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# /actuator/info contributors. `env` is off by default in Boot 3 (info would leak env vars
# without explicit allow-listing); `build` and `git` ride on the build-info / git-info
# files the Maven plugins produce.
management.info.env.enabled=false
management.info.build.enabled=true
management.info.git.enabled=true
management.info.git.mode=simple

# ---- Distributed tracing: cross-profile default ----
# The micrometer-tracing-bridge-otel dependency puts Spring Boot in charge of the W3C Trace
# Context standard: it reads/generates the `traceparent` header per request and exposes
# `traceId` / `spanId` in the SLF4J MDC — read by the logback pattern in dev/test and flattened
# into the JSON log line in prod. No trace backend is wired (no Tempo/Jaeger exporter), so
# sampling only decides which spans *would* be exported; the `traceId` reaches the MDC for log
# correlation regardless. 1.0 keeps the mental model simple — every request gets a trace — and
# costs nothing without an exporter.
management.tracing.sampling.probability=1.0

# Console pattern lives in src/main/resources/logback-spring.xml because we need to swap the
# whole encoder (plain text in dev/test, JSON via LogstashEncoder in prod) — a property-based
# pattern cannot do that.

# ---- CORS: cross-profile defaults ----
# Browser-enforced cross-origin policy, bound to CorsProperties and applied by SecurityConfig.
# Methods, headers and exposed-headers follow from the API's own design and are stable across
# environments, so they live here. Only `allowed-origins` varies per deployment — the prod
# profile overrides it from the CORS_ALLOWED_ORIGINS environment variable.
#
# The dev/test default points at the common SPA dev-server ports (CRA/Next 3000, Vite 5173).
# allowed-headers must include Idempotency-Key (deposit/withdraw/transfer require it) and
# traceparent (W3C Trace Context — lets a browser client propagate a trace into the API).
# exposed-headers lets the browser read Retry-After (429s).
application.cors.allowed-origins=http://localhost:3000,http://localhost:5173
application.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
application.cors.allowed-headers=Authorization,Content-Type,Idempotency-Key,traceparent
application.cors.exposed-headers=Retry-After
application.cors.max-age=3600

# ---- Password policy: cross-profile default ----
# Breach screening (NIST SP 800-63B §5.1.1.2): a chosen password is checked against the
# HaveIBeenPwned corpus at registration and rotation, via k-anonymity (only the first 5 hex chars
# of the SHA-1 digest leave the JVM). Enabled by default for every profile; the screening fails
# open, so an offline dev box still registers users (the check is skipped with a WARN). The test
# profile overrides this to false to keep integration tests off the public network. Prod can
# override via the PASSWORD_BREACH_CHECK_ENABLED environment variable.
application.security.password.breach-check-enabled=true

# ---- Account lockout: cross-profile default ----
# Persistent anti-bruteforce lockout (LoginAttemptService) — the durable second line behind the
# in-memory per-email AuthRateLimiter. After `max-attempts` consecutive failed logins the account
# transitions to UserStatus.LOCKED (HTTP 423) for `lockout-duration`, then auto-releases on the next
# attempt. Temporary by design: a permanent "contact support" lock would let anyone lock a victim out
# by knowing their email — OWASP ASVS V2.2 / NIST SP 800-63B §5.2.2 favour throttling/temporary
# lockout. Operators can disable or retune per environment without recompiling.
application.security.lockout.enabled=${ACCOUNT_LOCKOUT_ENABLED:true}
application.security.lockout.max-attempts=${ACCOUNT_LOCKOUT_MAX_ATTEMPTS:5}
application.security.lockout.lockout-duration=${ACCOUNT_LOCKOUT_DURATION:15m}

# ---- Security audit log: cross-profile default ----
# Append-only security event trail (SecurityAuditService -> security_audit_events): records login
# success/failure, logout, registration, password change, account lockout and refresh-token reuse,
# each with request context (ip, user agent, W3C trace id). The detection/forensics counterpart to the
# prevention controls above (OWASP ASVS V7). `enabled=false` makes recording a no-op — the audited
# operations are unaffected, since recording is fail-safe. `retention` bounds growth: the nightly
# ExpiredDataCleanupJob purges rows older than now-retention (the test profile disables that job via
# cron "-", so retention is inert there). Operators can retune per environment without recompiling.
application.security.audit.enabled=${SECURITY_AUDIT_ENABLED:true}
application.security.audit.retention=${SECURITY_AUDIT_RETENTION:365d}

# ---- MFA (TOTP second factor): cross-profile defaults ----
# Per-user opt-in TOTP (RFC 6238) — there is deliberately NO global kill-switch: a toggle that
# silently downgraded enrolled users to single-factor would be a security regression one env var
# away. challenge-expiration bounds the window between a correct password and the TOTP submission
# (the lifetime of the one-shot mfa+jwt challenge token); 5 minutes is generous for a human with a
# phone, near-worthless to an interceptor (the token only buys the right to attempt a code on an
# IP-throttled, lockout-protected endpoint). issuer is the label authenticator apps display, baked
# into the otpauth:// provisioning URI at enrollment.
application.security.mfa.challenge-expiration=${MFA_CHALLENGE_EXPIRATION:5m}
application.security.mfa.issuer=${MFA_ISSUER:PayDude}

# ---- Scheduled cleanup: cross-profile default ----
# Cron for the expired-row cleanup job (ExpiredDataCleanupJob), which purges idempotency_keys and
# refresh_tokens whose expires_at has passed. Spring 6-field cron (sec min hour day-of-month month
# day-of-week), evaluated in UTC (see the @Scheduled zone). Default 03:00 daily: a low-traffic hour,
# and once a day is ample for TTL hygiene on tables that only need bounded growth. Override per
# environment with CLEANUP_CRON; the test profile sets "-" (Scheduled.CRON_DISABLED) to keep the job
# from ever firing during integration tests.
application.cleanup.cron=${CLEANUP_CRON:0 0 3 * * *}

# ---- Actuator Basic-auth scraper: cross-profile defaults ----
# The admin tier of Actuator (/actuator/prometheus, /metrics, /loggers, /configprops, /env, ...)
# is guarded by HTTP Basic in SecurityConfig's dedicated actuator filter chain. This is a
# dedicated technical account, not a domain user — a Prometheus scraper or on-call operator is a
# machine/role, so it never gets a row in the `users` table. The username is stable across
# environments and lives here; only the password varies per profile (dev bakes a convenience
# default, prod requires ACTUATOR_PASSWORD from the environment, test uses a throwaway value).
application.security.actuator.username=${ACTUATOR_USERNAME:prometheus}
