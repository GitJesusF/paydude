spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/paydude_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

application.security.jwt.secret-key=${JWT_SECRET_KEY:0/cqwTDpHoxzKdR28jBPNZ4jMz/Sg9hlqzMER+6VRiY=}
# Access-token lifetime: short (15 min). Pairs with refresh-token rotation — clients trade in a
# refresh for a new access without re-logging in, so cutting the access lifetime down to minutes
# is cheap. Industry standard (Auth0, Okta default to similar windows).
application.security.jwt.expiration=${JWT_EXPIRATION_TIME:900000}

# Refresh-token lifetime: 7 days (PT168H). Long enough that mobile clients keep working after a
# weekend offline; short enough that a leaked token has finite blast radius. The refresh-token
# row is opaque and revocable — losing one is recoverable; losing a long-lived access JWT is not.
application.security.refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:PT168H}

# Actuator Basic-auth scraper password. Convenience default baked for local use (the same value
# is hardcoded in observability/prometheus.yml so the local Grafana stack scrapes with no setup).
# Override with ACTUATOR_PASSWORD for anything that leaves the laptop. Username comes from
# application.properties (defaults to `prometheus`).
application.security.actuator.password=${ACTUATOR_PASSWORD:local-actuator-secret}

# ---- Credential rotation policy ----
# Number of days before a password is considered expired. 0 disables the policy.
#
# NIST SP 800-63B (2020+) discourages periodic forced password rotation unless a compromise is
# suspected, because it leads users to pick predictable variants (Summer2025!, Summer2026!...).
# Modern auth providers (Google, Microsoft, major neobanks) dropped this policy for that reason.
#
# However, many PCI-DSS v3 audits, traditional banking systems, legacy healthcare platforms and
# government contracts still require it. The feature stays implemented and opt-in so the project
# can demonstrate the full UserDetails contract and so it can be enabled per-environment when
# compliance demands it.
#
# This dev profile keeps the feature ENABLED (90 days) so the behavior can be exercised
# end-to-end. Production defaults to 0 (disabled) in application-prod.properties.
application.security.credentials-expiration-days=90

# ---- Auth rate limiting ----
# Token-bucket thresholds enforced by AuthRateLimiter. `capacity` is both the bucket size and the
# refill amount per `period`. Tightening these is a deploy-free operational lever — in an active
# credential-stuffing incident, ops can drop login-by-email capacity to 3/15m via env override and
# restart the pod without touching code.
#
# Defaults below match the historical hard-coded values: generous IP buckets (NAT/proxy), strict
# per-email failures (refunded on success), very strict register-by-IP (no legitimate flow creates
# many accounts).
application.security.rate-limit.login-by-ip.capacity=20
application.security.rate-limit.login-by-ip.period=1m
application.security.rate-limit.login-by-email.capacity=5
application.security.rate-limit.login-by-email.period=15m
application.security.rate-limit.register-by-ip.capacity=5
application.security.rate-limit.register-by-ip.period=1h
# A logged-in client refreshes ~4x/hour per active session (every 15 min = the access-token TTL).
# 60/h leaves room for 4 devices/tabs comfortably and still cuts off broad enumeration attempts —
# attacker can't make millions of guesses against the 256-bit token space from one IP.
application.security.rate-limit.refresh-by-ip.capacity=60
application.security.rate-limit.refresh-by-ip.period=1h
# Per-user throttle for the money-moving writes (deposit, withdraw, transfer), keyed by the
# authenticated user id and enforced by WriteRateLimiter from the controllers. 30/min is generous
# for a human moving money by hand but bounds a script that hammers writes — the abuse that grows
# DB state (idempotency_keys / transactions / account_audits) and holds account row-locks.
application.security.rate-limit.write-by-user.capacity=30
application.security.rate-limit.write-by-user.period=1m
# MFA verify is the one auth endpoint where online guessing is arithmetically viable (10^6 codes,
# ~3 valid inside the ±1-step window), so the per-IP bucket is strict. The persistent per-account
# lockout (failed codes count like failed passwords) is the second line.
application.security.rate-limit.mfa-by-ip.capacity=10
application.security.rate-limit.mfa-by-ip.period=1m
# Per-user throttle for the password re-authentication gates (change-password, MFA setup/disable),
# keyed by the authenticated user id and enforced by ReauthRateLimiter from the controllers. These
# verify the account password behind a bearer token but are NOT covered by the IP/email auth
# throttles, so without this a stolen token could brute-force the password at BCrypt speed. Mirrors
# login-by-email (5 / 15m): a password re-auth is as sensitive as a login. A 429 (not the account
# lockout) keeps the legitimate owner able to log in and evict the attacker.
application.security.rate-limit.reauth-by-user.capacity=5
application.security.rate-limit.reauth-by-user.period=15m

# ---- Idempotency ----
# How long a reserved idempotency key remains queryable before ExpiredDataCleanupJob is allowed to
# purge it. The previous hard-coded value was 24 days; kept here as the dev default so local retries
# have a long replay window while the scheduled cleanup still bounds table growth.
application.idempotency.key-ttl=24d

spring.docker.compose.file=docker-compose.db-only.yml
spring.docker.compose.lifecycle-management=start-and-stop

# OpenAPI / Swagger UI: explicitly enabled in dev so the intent is documented and so
# springdoc stops printing its "enabled by default" startup warning. Disabled in prod
# (see application-prod.properties) — exposing the full API surface to the public is
# unnecessary attack-surface for a service whose clients are first-party.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ---- Actuator (dev profile) ----
# Wide exposure so a developer can introspect a running JVM without restarting it:
#   - health, info, metrics, prometheus   → observability surface
#   - configprops, env, beans, mappings   → live config and wiring inspection
#   - loggers                             → POST /actuator/loggers/<logger> to retune levels
#   - threaddump, heapdump                → diagnostics for hangs and memory issues
# `show-details=always` is fine in dev: nothing sensitive ships and the laptop is the audience.
# Prod overrides this to a much narrower surface — see application-prod.properties.
management.endpoints.web.exposure.include=health,info,metrics,prometheus,configprops,env,beans,mappings,loggers,threaddump,heapdump
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
