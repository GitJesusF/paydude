spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false

application.security.jwt.secret-key=${JWT_SECRET_KEY}
# Access-token lifetime. Recommended: 15 min (900000) when refresh tokens are wired. The env var
# is mandatory — there is no default to ensure ops thinks about the value at deploy time.
application.security.jwt.expiration=${JWT_EXPIRATION_TIME}
# Refresh-token lifetime. Format accepts ISO-8601 (PT168H) or DurationStyle (7d). The 7-day
# default mirrors dev; tighten per regulatory tenant via the env var.
application.security.refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:PT168H}

# Credential rotation policy: disabled by default, per NIST SP 800-63B guidance.
# Set CREDENTIALS_EXPIRATION_DAYS at deploy time to a positive integer only if a specific
# compliance regime (PCI-DSS v3, internal audit, regulated industry) requires periodic
# password changes.
application.security.credentials-expiration-days=${CREDENTIALS_EXPIRATION_DAYS:0}

# Breached-password screening (NIST SP 800-63B §5.1.1.2) — on by default, env-overridable. Set
# PASSWORD_BREACH_CHECK_ENABLED=false only if an air-gapped deployment cannot reach the public
# HaveIBeenPwned API; the check already fails open on an outage, so the override is for
# deployments where reaching the API is impossible by policy, not merely unreliable.
application.security.password.breach-check-enabled=${PASSWORD_BREACH_CHECK_ENABLED:true}

# Actuator Basic-auth scraper password — mandatory in prod (no default), so a deploy that forgets
# to inject a credential fails fast at boot rather than shipping the guessable dev default. The
# prod compose overlay (docker-compose.prod.yml) surfaces the same requirement at `docker compose
# up` time. The username defaults to `prometheus` from application.properties (override with
# ACTUATOR_USERNAME if desired).
application.security.actuator.password=${ACTUATOR_PASSWORD}

# Auth rate-limit thresholds — overridable per environment via env vars. Defaults mirror the dev
# profile; production deployments typically tighten login-by-email further (e.g. 3 attempts / 30m).
# The buckets live in process-local Caffeine caches inside AuthRateLimiter; when scaling
# horizontally, swap them for a Redis-backed ProxyManager (bucket4j-redis) so all replicas share
# state. The IP-keyed limits are also enforced at the servlet filter chain (IpRateLimitFilter).
application.security.rate-limit.login-by-ip.capacity=${RATE_LIMIT_LOGIN_IP_CAPACITY:20}
application.security.rate-limit.login-by-ip.period=${RATE_LIMIT_LOGIN_IP_PERIOD:1m}
application.security.rate-limit.login-by-email.capacity=${RATE_LIMIT_LOGIN_EMAIL_CAPACITY:5}
application.security.rate-limit.login-by-email.period=${RATE_LIMIT_LOGIN_EMAIL_PERIOD:15m}
application.security.rate-limit.register-by-ip.capacity=${RATE_LIMIT_REGISTER_IP_CAPACITY:5}
application.security.rate-limit.register-by-ip.period=${RATE_LIMIT_REGISTER_IP_PERIOD:1h}
application.security.rate-limit.refresh-by-ip.capacity=${RATE_LIMIT_REFRESH_IP_CAPACITY:60}
application.security.rate-limit.refresh-by-ip.period=${RATE_LIMIT_REFRESH_IP_PERIOD:1h}
# Per-user throttle for money-moving writes (deposit, withdraw, transfer), keyed by the
# authenticated user id and enforced by WriteRateLimiter. Tighten per environment via the env vars;
# the IP-keyed auth limits do not cover authenticated writes, so this is the only bound on a single
# account hammering writes. Process-local Caffeine like the auth buckets — swap for bucket4j-redis
# when scaling horizontally so replicas share the per-user budget.
application.security.rate-limit.write-by-user.capacity=${RATE_LIMIT_WRITE_USER_CAPACITY:30}
application.security.rate-limit.write-by-user.period=${RATE_LIMIT_WRITE_USER_PERIOD:1m}
# MFA verify is the one auth endpoint where online guessing is arithmetically viable (a 6-digit
# TOTP space, ~3 valid codes inside the ±1-step window), so its per-IP bucket is the strictest.
# The persistent per-account lockout (failed codes count like failed passwords) is the second line.
application.security.rate-limit.mfa-by-ip.capacity=${RATE_LIMIT_MFA_IP_CAPACITY:10}
application.security.rate-limit.mfa-by-ip.period=${RATE_LIMIT_MFA_IP_PERIOD:1m}
# Per-user throttle for the password re-authentication gates (change-password, MFA setup/disable),
# enforced by ReauthRateLimiter. These re-verify the account password behind a bearer token but are
# not covered by the IP/email auth throttles, so this is the only bound stopping a stolen token from
# brute-forcing the password at the side-door endpoints. Mirrors login-by-email (5 / 15m); a 429 (not
# the account lockout) keeps the legitimate owner able to log in and revoke the compromised session.
application.security.rate-limit.reauth-by-user.capacity=${RATE_LIMIT_REAUTH_USER_CAPACITY:5}
application.security.rate-limit.reauth-by-user.period=${RATE_LIMIT_REAUTH_USER_PERIOD:15m}

# Idempotency key retention — env-overridable. Compliance regimes that mandate shorter retention
# of request fingerprints (e.g. PCI-DSS scope reduction) can drop this to 7d or less without code
# changes; the cleanup job will adjust its scan cadence accordingly.
application.idempotency.key-ttl=${IDEMPOTENCY_KEY_TTL:24d}

spring.docker.compose.enabled=false

# CORS allowed origins — mandatory in prod, no default. Like JWT_EXPIRATION_TIME, the absence of
# a fallback forces ops to set CORS_ALLOWED_ORIGINS deliberately at deploy time to the exact
# first-party frontend host(s), e.g. https://app.paydude.com. A wrong or missing value surfaces
# immediately (the browser blocks the SPA) rather than silently. Methods, headers and
# exposed-headers are inherited from application.properties — they do not vary by environment.
application.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# X-Forwarded-* handling. With `native`, Tomcat's RemoteIpValve unwraps X-Forwarded-For only when
# the immediate TCP peer matches `server.tomcat.remoteip.internal-proxies` (default: RFC 1918
# private ranges + loopback). After unwrapping, request.getRemoteAddr() returns the real client
# IP — IpRateLimitFilter and RateLimitExceptionHandler both rely on this. Reading XFF from
# application code instead would be unsafe: any client can forge the header. If this app is
# deployed behind a proxy outside the default trusted ranges (e.g. AWS NLB at a public IP),
# tighten `server.tomcat.remoteip.internal-proxies` to that exact peer.
server.forward-headers-strategy=native

# OpenAPI / Swagger UI: disabled in production. The interactive docs and the raw OpenAPI
# spec together expose every endpoint, parameter, DTO shape and validation rule — useful
# in dev, an unnecessary recon surface for an attacker in prod. First-party clients ship
# with their own SDK or generated client and don't need the live UI.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ---- Actuator (prod profile) ----
# Narrow exposure on purpose. The endpoints below split into two trust tiers, enforced by
# SecurityConfig:
#
#   Public (permitAll, scraped by orchestrators):
#     - health           → liveness/readiness for the load balancer and K8s probes
#     - info             → app name, version, build/git metadata for deploy verification
#
#   Restricted to ROLE_ADMIN:
#     - prometheus       → scrape endpoint for Prometheus / Grafana Agent
#     - metrics          → raw Micrometer registry (cardinality detail not in Prometheus)
#     - loggers          → runtime log-level changes
#     - configprops, env → typed config inspection (env values are sanitized by Boot)
#
# `show-details=when-authorized` means /actuator/health returns the minimal `{"status":"UP"}`
# to anonymous probes but the full breakdown (DB pool, disk, etc.) only to authenticated
# admins. `roles` matches Spring Security's authority prefix used in this project.
management.endpoints.web.exposure.include=health,info,prometheus,metrics,loggers,configprops,env
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.health.roles=ROLE_ADMIN

# Sanitization of sensitive properties. Boot 3 already redacts `password`, `secret`, `key`,
# `token`, `credentials`, `vcap_services` and Authorization headers; making the policy
# explicit here is defensive — a future Boot upgrade that changes the default will not
# silently widen the exposure.
management.endpoint.configprops.show-values=never
management.endpoint.env.show-values=never
