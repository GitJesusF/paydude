# Named "CI" because this is the project's whole pipeline — the build-test job (unit +
# Testcontainers integration suite) is the functional gate on every push — not a security-only
# add-on bolted next to a separate build. The DevSecOps jobs ride in the same workflow.
name: CI

# DevSecOps pipeline — functional gate (tests) + supply-chain SCA, SAST, SBOM, and container scan.
# The security scans run under the Maven `security` profile (see pom.xml), kept out of the default
# `./mvnw verify` so local builds stay fast. Gate policy: fail on High+Critical
# (Dependency-Check CVSS >= 7, Trivy HIGH/CRITICAL, any FindSecBugs SECURITY finding); accepted
# false positives live in committed suppression/filter files.
on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Weekly (Mondays 06:00 UTC) — catches CVEs newly disclosed against unchanged dependencies.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to the GitHub Security tab (Code Scanning)

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Functional gate: the existing unit + Testcontainers integration suite (Docker is preinstalled on
  # GitHub-hosted runners, so Testcontainers works out of the box).
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + test (unit + integration)
        run: ./mvnw -B verify
      - name: Upload JaCoCo coverage report
        if: always() && hashFiles('target/site/jacoco/index.html') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # Supply chain: SCA (OWASP Dependency-Check) + SAST (SpotBugs/FindSecBugs) + SBOM (CycloneDX),
  # all via the Maven `security` profile. A High+Critical CVE (failBuildOnCVSS=7) or any FindSecBugs
  # SECURITY finding fails this job.
  supply-chain:
    name: SCA + SAST + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # Restore the NVD database so the SCA run does a fast incremental update instead of a full cold
      # feed download. The run_id in the key makes every run save a fresh (incrementally updated) DB,
      # restored from the most recent one. Restore/save are split (instead of actions/cache) so the DB
      # is saved even when the job FAILS (see the always() Save step) — actions/cache only saves on
      # success, so a failing scan left every run starting cold, and the flaky cold NVD sync (NPE on
      # an empty NVD response) kept the job red on a loop.
      - name: Restore NVD database
        id: nvd-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-
      - name: Run SCA + SAST + SBOM
        env:
          # Free key from https://nvd.nist.gov/developers/request-an-api-key — set as a repo secret.
          # The scan still runs without it, just slower on the first NVD sync.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -Psecurity verify -DskipTests
      # Persist the NVD database even if the scan above failed, so the next run restores it instead of
      # paying the flaky cold full sync again. Once one run completes a full sync, nvdValidForHours=24
      # lets subsequent runs skip the NVD API entirely.
      - name: Save NVD database
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}
      - name: Upload Dependency-Check SARIF
        if: always() && hashFiles('target/dependency-check-report.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: target/dependency-check-report.sarif
          category: dependency-check
      - name: Upload SpotBugs SARIF
        if: always() && hashFiles('target/spotbugsSarif.json') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: target/spotbugsSarif.json
          category: spotbugs
      - name: Upload SBOM + scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-and-reports
          path: |
            target/bom.json
            target/bom.xml
            target/dependency-check-report.html
            target/spotbugsSarif.json
          if-no-files-found: warn

  # Container image scan: the runtime base image (eclipse-temurin:21-jre-alpine) + OS packages — the
  # layer the Java scanners don't see. Two Trivy steps: one writes SARIF (report-only), the other is
  # the gate that fails on HIGH/CRITICAL.
  image-scan:
    name: Image scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build image
        run: docker build -t paydude:${{ github.sha }} .
      - name: Trivy scan (SARIF, report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: paydude:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Trivy gate (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: paydude:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
