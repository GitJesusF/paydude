# OpenSSF Scorecard — audits this repo's OWN supply-chain posture (are the actions SHA-pinned? is
# the default branch protected? are workflow token permissions least-privilege?) and uploads the
# result as SARIF to the Security tab. It complements security.yml: that one scans the *code and
# image*; this one scans the *repo's hygiene*. With publish_results it also feeds the public
# OpenSSF Scorecard (https://scorecard.dev), which is what a README score badge points at.
name: Scorecard

on:
  branch_protection_rule:          # re-score when branch protection changes
  schedule:
    - cron: '30 6 * * 1'           # weekly Monday, just after the security.yml scan (06:00)
  push:
    branches: [ main ]
  workflow_dispatch:

# Least privilege by default; the analysis job opts into exactly the two scopes it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write       # upload the SARIF result to Code Scanning
      id-token: write              # publish the signed result to the public OpenSSF Scorecard
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: scorecard
