services:
  db:
    image: postgres:17-alpine
    container_name: paydude-db
    environment:
      POSTGRES_DB: ${DB_NAME:-paydude_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-paydude_db}"]
      interval: 5s
      timeout: 5s
      retries: 5